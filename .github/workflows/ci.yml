name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  repository-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run repository checks
        run: bash scripts/ci/repository_checks.sh

  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

  coverage-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run coverage gate
        run: bash scripts/ci/coverage_gate.sh

  embedded-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout App-References
        uses: actions/checkout@v7

      - name: Checkout Traverse
        uses: actions/checkout@v7
        with:
          repository: traverse-framework/Traverse
          ref: v0.8.2
          path: .traverse-checkout

      - name: Install sync tools
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: Run embedded smoke (Linux-required slices)
        env:
          TRAVERSE_REPO: ${{ github.workspace }}/.traverse-checkout
          EMBEDDED_SMOKE_EXPECT: linux
        run: bash scripts/ci/embedded_smoke.sh

  # Tiered native CI (#88): PR merge-blocking = Linux cargo (core + CLI).
  # GTK / Android not yet PR-stable. Apple/Windows = nightly required.
  native-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout App-References
        uses: actions/checkout@v7

      - name: Checkout Traverse
        uses: actions/checkout@v7
        with:
          repository: traverse-framework/Traverse
          ref: v0.8.2
          path: .traverse-checkout

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: Link Traverse examples
        env:
          TRAVERSE_REPO: ${{ github.workspace }}/.traverse-checkout
        run: bash scripts/ci/phase2_link_traverse.sh

      - name: cargo test traverse-starter (core + cli)
        working-directory: apps/traverse-starter
        run: cargo test -p traverse-core-rs -p traverse-starter-cli

      - name: cargo test doc-approval (core + cli)
        working-directory: apps/doc-approval
        run: cargo test -p doc-approval-core-rs -p doc-approval-cli

  pr-hygiene:
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Save PR body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          curl -sS \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${PR_NUMBER}" \
            | python3 -c 'import json,sys; print(json.load(sys.stdin).get("body",""))' \
            > /tmp/pr-body.md

      - name: Validate PR body sections
        run: bash scripts/ci/pr_body_check.sh /tmp/pr-body.md
