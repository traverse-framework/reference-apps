name: Nightly

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:        # manual trigger

jobs:
  golden-path:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Run repository checks
        run: bash scripts/ci/repository_checks.sh

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Run Phase 1 smoke test
        env:
          TRAVERSE_RUNTIME_URL: ${{ vars.TRAVERSE_RUNTIME_URL }}
        run: bash scripts/ci/phase1_smoke.sh

  # Tiered native CI — nightly required: Apple + Windows + Android + GTK.
  native-macos:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Select Xcode 16 (Swift 6 tools for TraverseCore)
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer \
            || sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer \
            || sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer \
            || sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer \
            || sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer \
            || sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Build + test traverse-starter macOS
        working-directory: apps/traverse-starter/macos-swift
        run: |
          xcodebuild \
            -scheme TraverseStarterMac \
            -destination 'platform=macOS' \
            build test \
            CODE_SIGNING_ALLOWED=NO

      - name: Build + test doc-approval macOS
        working-directory: apps/doc-approval/macos-swift
        run: |
          xcodebuild \
            -scheme DocApprovalMac \
            -destination 'platform=macOS' \
            build test \
            CODE_SIGNING_ALLOWED=NO

  native-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore + test traverse-starter WinUI
        working-directory: apps/traverse-starter/windows-winui
        run: |
          dotnet restore TraverseStarter.sln
          dotnet test TraverseStarter.sln -c Release --nologo

      - name: Restore + test doc-approval WinUI
        working-directory: apps/doc-approval/windows-winui
        run: |
          dotnet restore DocApproval.sln
          dotnet test DocApproval.sln -c Release --nologo

  # Required: GTK shells (AdwApplicationWindowExt / GString fixes landed).
  native-linux-gtk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Checkout Traverse
        uses: actions/checkout@v7
        with:
          repository: traverse-framework/Traverse
          ref: v0.8.2
          path: .traverse-checkout

      - name: Install GTK build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libcairo2-dev pkg-config

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.94.0

      - name: Link Traverse examples
        env:
          TRAVERSE_REPO: ${{ github.workspace }}/.traverse-checkout
        run: bash scripts/ci/phase2_link_traverse.sh

      - name: cargo test GTK shells
        run: |
          (cd apps/traverse-starter && cargo test -p traverse-starter-gtk)
          (cd apps/doc-approval && cargo test -p doc-approval-gtk)

  # Required: Android unit tests via public RuntimeTraverseEmbedder(TraverseBundle).
  native-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Checkout Traverse
        uses: actions/checkout@v7
        with:
          repository: traverse-framework/Traverse
          ref: v0.8.2
          path: .traverse-checkout

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Gradle test traverse-starter
        working-directory: apps/traverse-starter/android-compose
        env:
          TRAVERSE_REPO: ${{ github.workspace }}/.traverse-checkout
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Gradle test doc-approval
        working-directory: apps/doc-approval/android-compose
        env:
          TRAVERSE_REPO: ${{ github.workspace }}/.traverse-checkout
        run: ./gradlew --no-daemon testDebugUnitTest
